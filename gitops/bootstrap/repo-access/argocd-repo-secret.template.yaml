apiVersion: v1
kind: Secret
metadata:
  # Use one unique Kubernetes secret name per repository.
  name: your-app-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  # This is the Argo CD repository name shown in the UI.
  name: your-app
  type: git
  # Change this to your own Git repository URL before applying the secret.
  url: git@github.com:your-org/your-app.git
  # Replace this with the matching private deploy key for that repository.
  sshPrivateKey: |
    REPLACE_WITH_LOCAL_PRIVATE_KEY
