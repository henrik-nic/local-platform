apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: publicdocs-dev
  namespace: argocd
spec:
  project: default
  source:
    # Change this to your own application repository before syncing with Argo CD.
    repoURL: git@github.com:your-org/your-publicdocs-repo.git
    targetRevision: main
    path: deploy/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: local-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
